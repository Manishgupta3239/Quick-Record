<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Screen Recorder</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            margin: 0;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
            text-align: center;
        }
        h1 { font-size: 18px; margin-bottom: 12px; color: #fff; }
        p { font-size: 14px; color: #8892b0; margin-bottom: 20px; max-width: 360px; }
        .error { color: #e94560; margin-bottom: 16px; }
        button {
            padding: 12px 24px;
            font-size: 14px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin: 4px;
        }
        button:hover { opacity: 0.9; }
        button.secondary { background: #0f3460; }
        #status { font-weight: 600; color: #e94560; margin-top: 16px; }
    </style>
</head>
<body>
    <h1>Screen Recorder</h1>
    <p id="message">Requesting microphone access…</p>
    <p id="error" class="error" style="display: none;"></p>
    <div id="buttons" style="display: none;">
        <button id="chooseScreenBtn">Choose screen to share</button>
        <button id="continueWithoutMicBtn" class="secondary" style="display: none;">Continue without microphone</button>
        <button id="closeBtn" class="secondary">Close</button>
    </div>
    <div id="recordingUi" style="display: none;">
        <p id="recordingStatus">Recording… Stop from the extension popup.</p>
    </div>
    <p id="status"></p>
    <script src="record-tab.js"></script>
</body>
</html>
